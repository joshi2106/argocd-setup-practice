apiVersion: apps/v1
kind: Deployment
metadata:
  name: busapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: busapp
  template:
    metadata:
      labels:
        app: busapp
    spec:
      containers:
      - name: cont-1
        image: joshi2106/zomatofood:v1
        ports:
        - containerPort: 80
